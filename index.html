<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товарів | FOMAFASAD-RGB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        :root { --bg: #0a0a0a; --card: #141414; --accent: #e67e22; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; padding-top: 100px; }
        
        header { 
            background: rgba(10,10,10,0.9); padding: 15px 5%; display: flex; 
            justify-content: space-between; align-items: center; position: fixed; 
            width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 1.6rem; font-weight: 900; color: var(--white); text-decoration: none; }
        nav a { color: #e0e0e0; text-decoration: none; margin-left: 20px; font-size: 14px; }
        nav a:hover { color: var(--accent); }

        .container { padding: 40px 5%; max-width: 1200px; margin: auto; }
        h1 { font-size: 2.5rem; text-align: center; text-transform: uppercase; margin-bottom: 50px; }
        h1 span { color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .product-card { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.03); 
        }
        .product-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .product-card img { width: 100%; height: 220px; object-fit: cover; }
        .info { padding: 25px; }
        .price { font-size: 1.5rem; color: var(--accent); font-weight: 700; margin: 15px 0; }
        
        .btn-order { 
            display: block; background: var(--accent); color: white; text-align: center; 
            padding: 12px; text-decoration: none; border-radius: 5px; font-weight: 700;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">FOMAFASAD-RGB</a>
    <nav>
        <a href="index.html">Головна</a>
        <a href="catalog.html" style="color: var(--accent);">Каталог</a>
        <a href="contacts.html">Контакти</a>
    </nav>
</header>

<div class="container">
    <h1>Наш <span>Каталог</span></h1>
    <div class="grid">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1617191519105-d0c02f0d922a?q=80&w=800">
            <div class="info">
                <h3>Парапетні планки</h3>
                <p>Будь-які форми для парканів та дахів.</p>
                <div class="price">від 250 грн/м.п.</div>
                <a href="contacts.html" class="btn-order">Замовити</a>
            </div>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952?q=80&w=800">
            <div class="info">
                <h3>Відливи віконні</h3>
                <p>Сталь з полімерним покриттям (RAL).</p>
                <div class="price">від 180 грн/м.п.</div>
                <a href="contacts.html" class="btn-order">Замовити</a>
            </div>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1581094271901-8022df4466f9?q=80&w=800">
            <div class="info">
                <h3>Спецвироби</h3>
                <p>Гнуття за вашими індивідуальними кресленнями.</p>
                <div class="price">Договірна</div>
                <a href="contacts.html" class="btn-order">Замовити</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
